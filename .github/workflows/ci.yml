name: 'Terraform CI & Security Scan'

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-ci:
    name: 'Terraform Plan & SecOps'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4 # 官方文档推荐使用 v4 以获得更好的性能

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3 # 升级到 v3 匹配最新环境
        with:
          terraform_version: 1.5.0

      - name: 🚀 Terraform Init
        run: terraform init

      # 🛑 鬼门关：使用官方标准 Action 进行 IaC 扫描
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy
        run: |
          trivy config --exit-code 1 --severity CRITICAL,HIGH .

            - name: 📝 Terraform Plan
              run: terraform plan -out=tfplan