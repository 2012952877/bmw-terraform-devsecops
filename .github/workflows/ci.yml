name: 'Terraform CI & Security Scan'

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-ci:
    name: 'Terraform Plan & SecOps'
    runs-on: ubuntu-latest
    # 核心修复：直接把 Secrets 映射为 Terraform 官方识别的环境变量
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: ⚙️ Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: 🚀 Terraform Init
      run: terraform init

    # IaC 静态安全扫描 (Trivy)
    - name: 🕵️ Run Trivy Security Scanner
      run: |
        echo "⬇️ 1. 正在召唤 Trivy 引擎 (安装到当前目录以绕过 Root 权限)..."
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .
        
        echo "🚀 2. 炮管预热完毕，开始对准代码开火！"
        ./trivy config --exit-code 1 --severity CRITICAL,HIGH .

    # 沙盘推演
    - name: 📝 Terraform Plan
      run: terraform plan -out=tfplan