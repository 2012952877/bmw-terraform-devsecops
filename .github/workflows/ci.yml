name: 'Terraform CI & Security Scan'

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-ci:
    name: 'Terraform Plan & SecOps'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4 # 官方文档推荐使用 v4 以获得更好的性能

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3 # 升级到 v3 匹配最新环境
        with:
          terraform_version: 1.5.0

      - name: 🚀 Terraform Init
        run: terraform init

      # 🛑 鬼门关：使用官方标准 Action 进行 IaC 扫描
      - name: 🕵️ Run Trivy Security Scanner (IaC Mode)
        uses: aquasecurity/trivy-action@0.33.1 # 使用您在文档中看到的最新稳定版
        with:
          scan-type: 'config' # 专门用于扫描 IaC 配置（Terraform/Docker/K8s）
          hide-progress: true # 减少日志干扰
          format: 'table'     # 在控制台打印漂亮的表格
          exit-code: '1'      # 🚨 发现 CRITICAL/HIGH 漏洞时，强制让流水线报错退出
          severity: 'CRITICAL,HIGH' # 只关注最致命的漏洞

      - name: 📝 Terraform Plan
        run: terraform plan -out=tfplan