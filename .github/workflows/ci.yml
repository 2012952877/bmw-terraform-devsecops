name: 'Terraform CI & Security Scan'

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-ci:
    name: 'Terraform Plan & SecOps'
    runs-on: ubuntu-latest
    # 核心修复：直接把 Secrets 映射为 Terraform 官方识别的环境变量
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: ⚙️ Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: 🚀 Terraform Init
      run: terraform init

    # IaC 静态安全扫描 (Trivy)
    - name: 🕵️ Run Trivy Security Scanner
      run: |
        echo "⬇️ 1. 从 GitHub Release 直接下载 Trivy 二进制压缩包..."
        wget -q https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_Linux-64bit.tar.gz
        
        echo "📦 2. 解压安装包..."
        tar zxvf trivy_0.49.1_Linux-64bit.tar.gz
        
        echo "🚀 3. 使用当前目录的 ./trivy 引擎开火扫描！"
        ./trivy config --exit-code 1 --severity CRITICAL,HIGH .

    # 沙盘推演
    - name: 📝 Terraform Plan
      run: terraform plan -out=tfplan